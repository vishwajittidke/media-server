name: Keep Render Alive

on:
  schedule:
    # Runs every 14 minutes to prevent Render's 15-minute idle spin-down
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://media-server-api.onrender.com/api/v1/health
